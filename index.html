<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>ILLUST QUEST</title>
<meta name="theme-color" content="#6c3fff"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="ILLUST QUEST"/>
<link rel="manifest" href="/illust-quest/manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* CSSを整理・統合しました */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0eeff; --bg2:#ffffff; --bg3:#f7f4ff; --bg4:#ede8ff;
  --border:#ddd6ff; --border2:#c4b8ff; --text:#1a1040; --text2:#5a4e8a;
  --text3:#9b8ec4; --primary:#6c3fff; --primary2:#5028dd; --primary-lt:#ede8ff;
  --primary-glow:rgba(108,63,255,0.25); --gold:#f59e0b; --green:#10b981;
  --red:#ef4444; --shadow:0 2px 12px rgba(108,63,255,0.10);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'M PLUS Rounded 1c',sans-serif}
body{display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;position:relative}

/* 共通パーツ */
#header{background:linear-gradient(135deg,var(--primary) 0%,#9d6bff 100%);padding:20px 16px;color:#fff}
.xp-track{height:8px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden;margin-top:8px}
.xp-fill{height:100%;background:#ffd700;width:0%;transition:width .5s}
#nav{display:flex;background:#fff;border-bottom:2px solid var(--border)}
.nav-btn{flex:1;padding:12px;border:none;background:none;font-weight:800;color:var(--text3);cursor:pointer}
.nav-btn.active{color:var(--primary);border-bottom:3px solid var(--primary)}
#content{flex:1;padding:16px;overflow-y:auto}
.panel{display:none}.panel.active{display:block}

/* コマンド系 */
.cmd-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.cmd-btn{padding:12px;border:2px solid var(--border);border-radius:12px;background:#fff;font-weight:800;cursor:pointer}
.cmd-btn.sel{border-color:var(--primary);background:var(--primary-lt);color:var(--primary)}
.locked-msg{padding:20px;text-align:center;color:var(--text3);font-size:12px}
.act-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-weight:900;margin-top:10px;cursor:pointer}

/* モーダル */
#lvup-overlay{display:none;position:fixed;inset:0;background:rgba(108,63,255,0.9);z-index:1000;color:#fff;justify-content:center;align-items:center;flex-direction:column}
#lvup-overlay.show{display:flex}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--primary);color:#fff;padding:8px 20px;border-radius:99px;opacity:0;transition:0.3s;z-index:2000}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div id="toast"></div>
  <div id="lvup-overlay" onclick="this.classList.remove('show')">
    <h1>LEVEL UP!</h1>
    <div id="lvup-rank"></div>
    <p>タップして閉じる</p>
  </div>

  <div id="header">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h2 id="rank-name">見習い絵師</h2>
      <div id="lv-badge"
