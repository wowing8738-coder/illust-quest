<script>
// === ここからスクリプトの修正版 ===
const STEPS=['ラフスケッチ','下書き','線画','彩色','投稿'];
const RANKS=[{lv:1,name:'見習い絵師',xp:0},{lv:2,name:'駆け出し絵師',xp:150},{lv:3,name:'一人前絵師',xp:400},{lv:4,name:'熟練絵師',xp:800},{lv:5,name:'上級絵師',xp:1400},{lv:6,name:'伝説の絵師',xp:2200}];
const XP_STEP=30,XP_POST=100,XP_FB=10,XP_CMD=5;
const CMDS=[{id:'illust',label:'イラスト制作',icon:'🎨'},{id:'work',label:'仕事・バイト',icon:'💼'},{id:'study',label:'勉強',icon:'📚'},{id:'rest',label:'休憩・遊び',icon:'🎮'},{id:'exercise',label:'運動',icon:'🏃'},{id:'custom',label:'その他',icon:'✏️'}];
const GOAL_CFG={follower:{label:'フォロワー数',unit:'人',color:'#a070e0'},posts:{label:'投稿数',unit:'投稿',color:'#06b6d4',auto:true},time:{label:'制作時間',unit:'h',color:'#f59e0b',auto:true},likes_x:{label:'X いいね累計',unit:'いいね',color:'#3b82f6',auto:true},likes_pix:{label:'pixiv いいね累計',unit:'いいね',color:'#10b981',auto:true}};
const KEY='illustquest_v3';

let S=loadState();
function loadState(){try{const s=localStorage.getItem(KEY);if(s)return JSON.parse(s);}catch{}return{xp:0,works:[],goals:[],dayLogs:[],streakDays:0,lastActiveDate:null,profile:{name:'',bio:'',icon:''}};}
function save(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch{}}
function todayStr(){return new Date().toDateString();}
function todayISO(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getRank(xp){let r=RANKS[0],nx=RANKS[1];for(let i=RANKS.length-1;i>=0;i--){if(xp>=RANKS[i].xp){r=RANKS[i];nx=RANKS[i+1]||null;break;}}const inLv=xp-r.xp,needed=nx?nx.xp-r.xp:1;return{r,nx,pct:Math.min(100,Math.round(inLv/needed*100))};}

// (中略: エフェクト関数などはそのまま)

function selectCmd(phase,id,label){
  const log=getTodayLog();
  const wasSet=log[phase]!==null;
  if(wasSet) S.xp=Math.max(0, S.xp-XP_CMD);
  log[phase]=id;
  log[phase+'Label']=id==='custom'?label:(CMDS.find(c=>c.id===id)?.label||id);
  S.xp=Math.max(0, S.xp+XP_CMD);
  save(); 
  renderHeader();
  renderToday();
  toast(wasSet?(phase==='am'?'午前':'午後')+'コマンドを変更しました':'コマンドを決定しました！');
}

// サービスワーカーの登録部分を修正
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/illust-quest/sw.js').then(reg => {
      console.log('SW registered');
    }).catch(err => {
      console.log('SW error', err);
    });
  });
}

// 初期化実行（このあたりも確実に）
window.onload = () => {
  renderHeader();
  renderToday();
  // タブ切り替えイベントなどの登録
};

</script>
